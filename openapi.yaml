openapi: "3.1.0"
info:
  title: komodo-search-api
  version: "0.1.0"
  description: |
    Full-text search over the product and service catalog via Typesense.
    Public search requires no authentication. Index management routes are private (service-to-service only).

    **Note:** Typesense integration is not yet wired. Search returns empty results until
    the index is populated via the events-api subscriber.

    **HTTP conventions:**
    POST → 201 Created / 400 Bad Request / 409 Conflict;
    PUT → 200 OK / 404 Not Found;
    DELETE → 204 No Content / 404 Not Found;
    GET → 200 OK / 404 Not Found.
servers:
  - url: http://localhost:7042
    description: Local dev

tags:
  - name: Health
  - name: Search
  - name: Index

paths:

  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy

  /v1/search:
    get:
      tags: [Search]
      summary: Search the product and service catalog
      operationId: search
      x-visibility: public
      security: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: Search index unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/index/sync:
    post:
      tags: [Index]
      summary: Trigger a full re-index from shop-items-api S3 data into Typesense
      operationId: indexSync
      x-visibility: private
      security:
        - bearerAuth: []
      responses:
        "202":
          description: Sync job accepted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Typesense unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/index:
    delete:
      tags: [Index]
      summary: Drop and recreate the Typesense collection (used for schema migrations)
      operationId: deleteIndex
      x-visibility: private
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Index dropped and recreated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Typesense unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SearchResult:
      type: object
      required: [sku, name, type, price, score]
      description: Single item from the Typesense index. Products and services share this shape — use type to differentiate.
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [product, service]
        price:
          type: number
          format: double
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        image_url:
          type: string
          format: uri
        score:
          type: number
          format: double
          description: Typesense relevance score

    SearchResponse:
      type: object
      required: [query, results, total, page, per_page]
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    Problem:
      type: object
      description: RFC 7807 Problem+JSON
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    BadRequest:
      description: Invalid query parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid service JWT
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
